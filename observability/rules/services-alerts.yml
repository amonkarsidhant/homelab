groups:
  - name: vm-services
    rules:
      - alert: ServiceDownTraefik
        expr: absent(container_last_seen{name=~"/?traefik"})
        for: 2m
        labels:
          severity: critical
          service: traefik
        annotations:
          summary: Traefik container is down
          details: The traefik container is not present in cAdvisor metrics for 2 minutes.

      - alert: ServiceDownGitea
