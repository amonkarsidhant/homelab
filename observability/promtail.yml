server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: system
    static_configs:
      - targets:
          - localhost
        labels:
          job: system-logs
          __path__: /var/log/*.log

  - job_name: docker-containers
    pipeline_stages:
      - docker: {}
    static_configs:
      - targets:
          - localhost
        labels:
          job: container-logs
          __path__: /var/lib/docker/containers/*/*-json.log
    relabel_configs:
      - source_labels: ['__path__']
        regex: '/var/lib/docker/containers/([^/]+)/.*'
        target_label: container_id

  - job_name: chaos-events
    static_configs:
      - targets:
          - localhost
        labels:
          job: chaos-events
          __path__: /home/sidhant/logs/chaos/*.log
