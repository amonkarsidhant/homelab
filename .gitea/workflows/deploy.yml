name: Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.gitea/workflows/docker.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - status

env:
  VM_HOST: 51.143.249.28
  VM_USER: sidhant
  APP_DIR: /home/sidhant/homelab

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: ShellCheck
        run: |
          which shellcheck && shellcheck scripts/*.sh || echo "No shell scripts to lint"
      
      - name: YAML lint
        run: |
          which yamllint && yamllint . || echo "yamllint not installed"

  deploy:
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ env.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          echo "=== Deploying to VM ==="
          ssh ${{ env.VM_USER }}@${{ env.VM_HOST }} "
            mkdir -p ${{ env.APP_DIR }} && \
            cd ${{ env.APP_DIR }} && \
            git init && \
            git remote remove origin 2>/dev/null || true && \
            git remote add origin https://gitea.homelabdev.space/sidhant/homelab.git && \
            git fetch origin main && \
            git reset --hard origin/main && \
            echo 'Code deployed!'
          "

      - name: Setup VM Services
        run: |
          echo "=== Setting up VM services ==="
          ssh ${{ env.VM_USER }}@${{ env.VM_HOST }} "
            cd ${{ env.APP_DIR }} && \
            
            # Create required directories
            sudo mkdir -p /mnt/data/{traefik,gitea,act-runner,prometheus,grafana,loki,jaeger,minio,authelia,mailserver}
            sudo chown -R ${{ env.VM_USER }}:${{ env.VM_USER }} /mnt/data 2>/dev/null || true
            
            # Create Docker network if not exists
            docker network create traefik_default 2>/dev/null || true
            
            # Sync service files from homelab repo
            echo 'Syncing service files...'
            
            # Create service directories
            mkdir -p /home/sidhant/{traefik,gitea,act-runner,observability,authelia,mailserver}
            
            echo 'Service directories created!'
          "

      - name: Start Services
        run: |
          echo "=== Starting services ==="
          ssh ${{ env.VM_USER }}@${{ env.VM_HOST }} "
            cd /home/sidhant/traefik && docker-compose up -d || echo 'Traefik may need config'
            cd /home/sidhant/gitea && docker-compose up -d || echo 'Gitea may need config'
            cd /home/sidhant/act-runner && docker-compose up -d || echo 'Act-runner may need config'
            
            echo 'Checking Docker status...'
            docker ps
          "

      - name: Verify deployment
        run: |
          ssh ${{ env.VM_USER }}@${{ env.VM_HOST }} "
            echo '=== VM Status ===' && \
            uptime && \
            echo '=== Recent Deploy ===' && \
            cd ${{ env.APP_DIR }} && \
            git log -1 --oneline
          "

  notify:
    runs-on: ubuntu-latest
    needs: [lint, deploy]
    if: always()
    steps:
      - name: Discord notification
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            curl -X POST "https://discord.com/api/webhooks/1479135880819249172/b9P59Bs0f0oLMU1yKEngIgPLQdEXUmw9CnYa-m3O4R9lRhHVdkESYdqBEWAC0lkJvAw_" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"✅ Deployment Successful\",
                  \"color\": 3066993,
                  \"fields\": [
                    {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\", \"inline\": true},
                    {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true}
                  ],
                  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                }]
              }"
          else
            curl -X POST "https://discord.com/api/webhooks/1479135880819249172/b9P59Bs0f0oLMU1yKEngIgPLQdEXUmw9CnYa-m3O4R9lRhHVdkESYdqBEWAC0lkJvAw_" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"❌ Deployment Failed\",
                  \"color\": 15158332,
                  \"fields\": [
                    {\"name\": \"Job\", \"value\": \"${{ needs.deploy.result }}\", \"inline\": true}
                  ],
                  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                }]
              }"
          fi
