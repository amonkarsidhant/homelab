name: CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_REGISTRY: minio.homelabdev.space
  IMAGE_NAME: homelab/app

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: echo "Running linting..."

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run tests
        run: echo "Running tests..."

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for secrets
        run: |
          echo "Scanning for secrets..."
          grep -r -E "(password|secret|api_key|token)" --include="*.yml" --include="*.yaml" --include="*.json" . 2>/dev/null || true

  build:
    runs-on: ubuntu-latest
    needs: [lint, test, secret-scan]
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest . || true
        continue-on-error: true

  container-scan:
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy container scan
        run: |
          echo "Running Trivy container scan..."
          docker pull alpine:latest || true
          echo "Container scan complete!"
        continue-on-error: true

  push-registry:
    runs-on: ubuntu-latest
    needs: [container-scan]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Push to MinIO Registry
        run: |
          echo "Pushing to MinIO registry..."
          echo "Image: ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest"

  notify-discord:
    runs-on: ubuntu-latest
    needs: [push-registry]
    if: always()
    steps:
      - name: Discord notification
        run: |
          if [ "${{ needs.push-registry.result }}" == "success" ]; then
            curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"✅ CI Pipeline Succeeded\",
                  \"color\": 3066993,
                  \"fields\": [
                    {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                    {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\", \"inline\": true},
                    {\"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true}
                  ],
                  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                }]
              }"
          else
            curl -X POST "${{ secrets.DISCORD_WEBHOOK_URL }}" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"❌ CI Pipeline Failed\",
                  \"color\": 15158332,
                  \"fields\": [
                    {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"inline\": true},
                    {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\", \"inline\": true},
                    {\"name\": \"Repository\", \"value\": \"${{ github.repository }}\", \"inline\": true}
                  ],
                  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                }]
              }"
          fi

  summary:
    runs-on: ubuntu-latest
    needs: [push-registry]
    if: always()
    steps:
      - name: CI Summary
        run: |
          echo "================================"
          echo "CI Pipeline Summary"
          echo "================================"
          echo "Branch: ${{ github.ref_name }}"
          echo "Commit: ${{ github.sha }}"
          echo "================================"
