name: Docker

on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'build'
        type: choice
        options:
          - build
          - push
          - scan

env:
  REGISTRY: minio.homelabdev.space
  IMAGE_NAME: homelab/app
  DOCKER_BUILDKIT: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        run: |
          echo "Setting up Docker Buildx..."
          docker version
          
      - name: Build Docker image
        run: |
          echo "Building Docker image..."
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest .
          docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          
      - name: List Docker images
        run: |
          docker images

  test-docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Pull built image
        run: |
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || true
          
      - name: Run container test
        run: |
          echo "Testing container..."
          # docker run --rm ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest echo "Container works!"

  scan-docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        run: |
          echo "Running Trivy vulnerability scan..."
          # Install Trivy
          curl -sfL https://aquasecurity.github.io/trivy/install.sh | sh
          trivy image --severity HIGH,CRITICAL ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest || true
          echo "Scan complete!"

  push-docker:
    runs-on: ubuntu-latest
    needs: [build, scan-docker]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      
      - name: Login to MinIO Registry
        run: |
          echo "Logging into MinIO registry..."
          # In production: echo ${{ secrets.MINIO_PASSWORD }} | docker login ${{ env.REGISTRY }} -u ${{ secrets.MINIO_USERNAME }} --password-stdin
          
      - name: Push to MinIO Registry
        run: |
          echo "Pushing to MinIO registry..."
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          # docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          
      - name: Push with version tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          docker tag ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION
          # docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:$VERSION
          
      - name: List pushed images
        run: |
          echo "Pushed images:"
          # docker images | grep ${{ env.REGISTRY }}

  notify-docker:
    runs-on: ubuntu-latest
    needs: [push-docker]
    if: always()
    steps:
      - name: Discord notification
        run: |
          if [ "${{ needs.push-docker.result }}" == "success" ]; then
            curl -X POST "https://discord.com/api/webhooks/1479135880819249172/b9P59Bs0f0oLMU1yKEngIgPLQdEXUmw9CnYa-m3O4R9lRhHVdkESYdqBEWAC0lkJvAw_" \
              -H "Content-Type: application/json" \
              -d "{
                \"embeds\": [{
                  \"title\": \"🐳 Docker Build & Push Complete\",
                  \"color\": 3066993,
                  \"fields\": [
                    {\"name\": \"Registry\", \"value\": \"${{ env.REGISTRY }}\", \"inline\": true},
                    {\"name\": \"Image\", \"value\": \"${{ env.IMAGE_NAME }}\", \"inline\": true}
                  ],
                  \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
                }]
              }"
          fi

