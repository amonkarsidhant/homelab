version: '3.8'

services:
  gitea:
    image: gitea/gitea:1.25
    container_name: gitea
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "2222:22"
    volumes:
      - /mnt/data/gitea:/data
      - /home/sidhant/gitea/data/git:/data/git
      - /home/sidhant/gitea/data/ssh:/data/ssh
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    environment:
      - USER_UID=1000
      - USER_GID=1000
      - GITEA__server__ROOT_URL=https://gitea.homelabdev.space/
      - GITEA__server__SSH_DOMAIN=gitea.homelabdev.space
      - GITEA__server__PROTOCOL=https
      - GITEA__server__CERT_FILE=/certs/cert.pem
      - GITEA__server__KEY_FILE=/certs/key.pem
      - GITEA__security__INSTALL_LOCK=true
      - GITEA__server__DISABLE_SSH=false
      - GITEA__server__SSH_PORT=2222
      - GITEA__server__HTTP_PORT=3000
    networks:
      - default

networks:
  default:
    name: traefik_default
    external: true
