  address: tcp://0.0.0.0:9091/

log:
  level: info

session:
  domain: homelabdev.space
  secret: ffb254957ac1e4c984c666a334a734ac1745e2e0ef79addd0328843a1224a64a
  cookies:
    - domain: homelabdev.space
      authelia_url: https://auth.homelabdev.space
      default_target_url: https://home.homelabdev.space

storage:
  encryption_key: 1c37cfe8dc96263b990e1c17cfef984770ea86de332e257261b6cea228d570a8
  local:
    path: /config/db.sqlite3

notifier:
  filesystem:
    filename: /config/notification.txt

authentication_backend:
  file:
    path: /config/users.yml

access_control:
  default_policy: deny

  rules:

    # Authelia itself — bypass all
    - domain: "auth.homelabdev.space"
      policy: bypass

    # Health checks — bypass
    - domain: "health.homelabdev.space"
      policy: bypass

    # Public services — no auth required
    - domain: "mail.homelabdev.space"
      policy: bypass

    # Admin-only services — only admins group
    - domain: "vault.homelabdev.space"
      policy: two_factor
      subject:
        - group:admins

    - domain: "admin.homelabdev.space"
      policy: two_factor
      subject:
        - group:admins

    # Developer-only services
    - domain: "code.homelabdev.space"
      policy: one_factor
      subject:
        - group:developers
        - group:admins

    - domain: "ai.homelabdev.space"
      policy: one_factor
      subject:
        - group:developers
        - group:admins

    - domain: "goalert.homelabdev.space"
      policy: one_factor
      subject:
        - group:users
        - group:admins

    # All authenticated users — default for remaining services
    - domain: "gitea.homelabdev.space"
      policy: one_factor
      subject:
        - group:users
        - group:admins

    - domain: "backstage.homelabdev.space"
      policy: one_factor
      subject:
        - group:developers
        - group:admins

    - domain: "home.homelabdev.space"
      policy: one_factor
      subject:
        - group:users
        - group:admins

    - domain: "chat.homelabdev.space"
      policy: one_factor
      subject:
        - group:users
        - group:admins

    # Observability — developers and admins
    - domain: "observability.homelabdev.space"
      policy: one_factor
      subject:
        - group:developers
        - group:admins

    # Catch-all — authenticated users only
    - domain: "*.homelabdev.space"
      policy: one_factor
      subject:
        - group:users
        - group:admins

