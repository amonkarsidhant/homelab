model_list:
  - model_name: nvidia-fast
    litellm_params:
      model: nvidia_nim/stepfun-ai/step-3.5-flash
      api_key: os.environ/NVIDIA_API_KEY

  - model_name: nvidia-balanced
    litellm_params:
      model: nvidia_nim/minimaxai/minimax-m2.1
      api_key: os.environ/NVIDIA_API_KEY

  - model_name: nvidia-reasoning
    litellm_params:
      model: nvidia_nim/qwen/qwen3.5-122b-a10b
      api_key: os.environ/NVIDIA_API_KEY

general_settings:
  master_key: os.environ/LITELLM_MASTER_KEY

litellm_settings:
  set_verbose: false
  drop_params: true
