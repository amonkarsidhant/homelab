version: '3.8'

services:
  backstage-postgres:
    image: postgres:16-alpine
    container_name: backstage-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=backstage
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=backstage
    volumes:
      - /mnt/data/backstage-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backstage -d backstage"]
      interval: 10s
      timeout: 5s
      retries: 10

  backstage:
    image: ghcr.io/backstage/backstage:latest
    container_name: backstage
    restart: unless-stopped
    depends_on:
      backstage-postgres:
        condition: service_healthy
    environment:
      - NODE_ENV=production
      - POSTGRES_HOST=backstage-postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=backstage
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - BACKEND_SECRET=${BACKEND_SECRET}
      - APP_CONFIG_backend_baseUrl=https://backstage.homelabdev.space
      - APP_CONFIG_app_baseUrl=https://backstage.homelabdev.space
    volumes:
      - /home/sidhant/backstage/app-config.yaml:/app/app-config.yaml:ro
      - /home/sidhant/backstage/app-config.production.yaml:/app/app-config.production.yaml:ro
      - /home/sidhant/backstage/catalog:/app/catalog
      - /home/sidhant/homelab:/repo:ro
      - /var/run/docker.sock:/var/run/docker.sock
      - techdocs-tmp:/tmp

volumes:
  techdocs-tmp:

networks:
  default:
    name: traefik_default
    external: true
