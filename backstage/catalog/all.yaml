apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: homelab-integrity-check
  description: Runtime integrity check command output contract
spec:
  type: openapi
  lifecycle: production
  owner: group:platform
  system: homelab
  definition: |
    openapi: 3.0.0
    info:
      title: Homelab Integrity Check
      version: 1.0.0
    paths:
      /scripts/service-integrity-check.sh:
        get:
          summary: Executes integrity checks and reports BAD/WARN counts
          responses:
            '200':
              description: Integrity result output
---
apiVersion: backstage.io/v1alpha1
kind: Location
metadata:
  name: homelab-service-onboarding-template
  description: Golden path template for homelab service catalog onboarding
spec:
  type: file
  target: /app/catalog/templates/homelab-service/template.yaml
