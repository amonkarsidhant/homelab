apiVersion: backstage.io/v1alpha1
kind: System
metadata:
  name: homelab
  description: Azure VM homelab platform for delivery, observability, and security
spec:
  owner: group:platform
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: azure-vm
  description: Single Azure VM hosting homelab services
spec:
  type: compute-instance
  owner: group:platform
  system: homelab
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: data-volume
  description: Persistent volume mounted at /mnt/data
spec:
  type: storage
  owner: group:platform
  system: homelab
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cloudflare-dns
  description: DNS and edge routing for homelabdev.space
spec:
  type: dns
  owner: group:platform
  system: homelab
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: traefik
  description: Reverse proxy and TLS ingress
  annotations:
    homelab.dev/tier: platform
    homelab.dev/criticality: high
    homelab.dev/runbook: docs/homelab-operations-runbook.md
  links:
    - url: https://traefik.homelabdev.space:8080
      title: Service URL
    - url: https://gitea.homelabdev.space/sidhant/homelab/src/branch/main/traefik
      title: Source Directory
    - url: https://gitea.homelabdev.space/sidhant/homelab/src/branch/main/docs/homelab-operations-runbook.md
      title: Runbook
    - url: https://gitea.homelabdev.space/sidhant/homelab/src/branch/main/docs/operations-checklist.md
      title: Ops Checklist
spec:
  type: service
  lifecycle: production
  owner: group:platform
  system: homelab
  dependsOn:
    - resource:default/azure-vm
    - resource:default/cloudflare-dns
---
