version: '3.8'

services:
  traefik:
    image: traefik:v3
    container_name: traefik
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /mnt/data/traefik:/etc/traefik
      - /mnt/data/traefik/certs:/certs:ro
      - /home/sidhant/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - /home/sidhant/traefik/dynamic:/etc/traefik/dynamic:ro
    environment:
      - TZ=UTC
      - CF_API_TOKEN=${CF_API_TOKEN}

  minio:
    image: minio/minio:latest
    container_name: minio
    restart: unless-stopped
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - /mnt/data/minio/data:/data
      - /mnt/data/minio/config:/root/.minio

networks:
  default:
    name: traefik_default
    external: true
