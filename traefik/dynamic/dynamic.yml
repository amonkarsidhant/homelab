http:
  routers:
    gitlab:
      rule: "Host(`gitlab.homelabdev.space`)"
      service: gitlab
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - authelia

    minio:
      rule: "Host(`minio.homelabdev.space`)"
      service: minio
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - authelia

    grafana:
      rule: "Host(`grafana.homelabdev.space`)"
      service: grafana
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - authelia

    prometheus:
      rule: "Host(`prometheus.homelabdev.space`)"
      service: prometheus
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - authelia

    jaeger:
      rule: "Host(`jaeger.homelabdev.space`)"
      service: jaeger
      entryPoints:
        - websecure
      tls:
        certResolver: letsencrypt
      middlewares:
        - authelia

  middlewares:
    authelia:
      forwardAuth:
        address: "http://authelia:9091/api/verify?rd=https://auth.homelabdev.space"
        trustForwardHeader: true

  services:
    gitlab:
      loadBalancer:
        servers:
          - url: "http://gitlab:80"

    minio:
      loadBalancer:
        servers:
          - url: "http://minio:9000"

    grafana:
      loadBalancer:
        servers:
          - url: "http://grafana:3000"

    prometheus:
      loadBalancer:
        servers:
          - url: "http://prometheus:9090"

    jaeger:
      loadBalancer:
        servers:
          - url: "http://jaeger:16686"
